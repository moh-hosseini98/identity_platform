name: FastAPI CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-todo-app:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-todo-app:${{ github.sha }}

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    defaults:
      run:
        working-directory: /home/mohammad/identity_platform
    steps:
        - name: Deploy
          run: |
            export IMAGE_TAG=${{ github.sha }}
            git pull origin main
            docker compose pull
            docker compose up -d
            docker image prune -f
    
    